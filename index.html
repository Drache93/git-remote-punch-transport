<!doctype html>
<html>
  <head>
    <script src="./gui/index.js" type="module"></script>
    <style>
      pear-ctrl[data-platform='darwin'] {
        margin-top: 12px;
        margin-left: 10px;
      }

      #titlebar {
        -webkit-app-region: drag;
        height: 30px;
        width: 100%;
        position: fixed;
        left: 0;
        top: 0;
        background-color: #b0d94413;
        filter: drop-shadow(2px 10px 6px #888);
      }

      body {
        color: rgb(255, 255, 254);
        font-family: 'abcFavorit', 'abcFavorit Fallback', system-ui, arial;
        height: 100vh;
        margin: 0;
      }

      * {
        scrollbar-width: thin;
        scrollbar-color: #bade5b #bade5b;
      }

      main {
        margin-top: 30px;
        padding: 12px;
        height: 100%;
        box-sizing: border-box;
        overflow: hidden;
      }

      main > div {
        display: flex;
        flex-flow: column nowrap;
        align-items: center;
        padding: 12px 24px;
        height: 100%;
      }

      remotes-list,
      remote-details,
      repo-files,
      add-remote,
      hr {
        width: 100%;
      }

      repo-files {
        overflow: hidden;
        flex: 1 1 auto;
      }
    </style>
  </head>
  <body>
    <div id="titlebar">
      <pear-ctrl></pear-ctrl>
    </div>
    <main></main>
  </body>
</html>
